name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

  bundle:
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Build UI bundle
        run: gulp bundle

      - name: Move beta tag to HEAD
        if: needs.release-please.outputs.release_created != 'true'
        run: |
          git tag -f beta
          git push origin -f refs/tags/beta

      - name: Get release PR notes for beta
        id: release-pr
        if: needs.release-please.outputs.release_created != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body=$(gh pr list --state open --label "autorelease: pending" --json body --jq '.[0].body // ""')
          {
            echo 'body<<EOF'
            echo "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.tag_name || 'beta' }}
          prerelease: ${{ needs.release-please.outputs.release_created != 'true' }}
          body: ${{ steps.release-pr.outputs.body }}
          files: |
            build/ui-bundle.zip
            build/extensions/antora-tldr-ui.js
            build/extensions/asciidoc-tldr-ui.js
